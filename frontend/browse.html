<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Browse — Adventure Codex</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
</head>
<body>
  <nav class="breadcrumb">
    <a href="/">← Codex</a>
  </nav>

  <h1 class="page-title">Browse Codex</h1>

  <div class="browse-tabs" role="tablist">
    <button type="button" role="tab" data-kind="npc"
            class="tab-btn {% if kind == 'npc' %}active{% endif %}"
            hx-get="/browse/grid?kind=npc" hx-target="#grid-area" hx-swap="innerHTML"
            onclick="setActiveTab(this)">Characters</button>
    <button type="button" role="tab" data-kind="location"
            class="tab-btn {% if kind == 'location' %}active{% endif %}"
            hx-get="/browse/grid?kind=location" hx-target="#grid-area" hx-swap="innerHTML"
            onclick="setActiveTab(this)">Locations</button>
    <button type="button" role="tab" data-kind="item"
            class="tab-btn {% if kind == 'item' %}active{% endif %}"
            hx-get="/browse/grid?kind=item" hx-target="#grid-area" hx-swap="innerHTML"
            onclick="setActiveTab(this)">Items</button>
    <button type="button" role="tab" data-kind="thread"
            class="tab-btn {% if kind == 'thread' %}active{% endif %}"
            hx-get="/browse/grid?kind=thread" hx-target="#grid-area" hx-swap="innerHTML"
            onclick="setActiveTab(this)">Plot Threads</button>
    <button type="button" role="tab" data-kind="party"
            class="tab-btn {% if kind == 'party' %}active{% endif %}"
            hx-get="/browse/grid?kind=party" hx-target="#grid-area" hx-swap="innerHTML"
            onclick="setActiveTab(this)">Party</button>
  </div>

  <!-- Allegiance grouping toggle — only shown for NPC tab -->
  <div class="allegiance-toggle-bar" id="allegiance-toggle-bar" {% if kind != 'npc' %}hidden{% endif %}>
    <button type="button" class="tag-pill" id="allegiance-group-btn" onclick="toggleAllegianceGroup()">
      ⚔ Group by Allegiance
    </button>
  </div>

  <!-- Thread-specific toolbar — only shown for Plot Threads tab -->
  <div class="thread-toolbar" id="thread-toolbar" {% if kind != 'thread' %}hidden{% endif %}>
    <div class="thread-age-filter">
      <span class="sort-label">Age</span>
      <button type="button" class="age-btn active" data-age="all"     onclick="filterAge(this)">All</button>
      <button type="button" class="age-btn"        data-age="recent"  onclick="filterAge(this)">Within 1 yr</button>
      <button type="button" class="age-btn"        data-age="mid"     onclick="filterAge(this)">1–2 yrs</button>
      <button type="button" class="age-btn"        data-age="old"     onclick="filterAge(this)">2+ yrs</button>
    </div>
    <div class="thread-status-filter">
      <span class="sort-label">Status</span>
      <button type="button" class="age-btn active" data-status="all"      onclick="filterStatus(this)">All</button>
      <button type="button" class="age-btn"        data-status="open"     onclick="filterStatus(this)">Open</button>
      <button type="button" class="age-btn"        data-status="dormant"  onclick="filterStatus(this)">Dormant</button>
      <button type="button" class="age-btn"        data-status="resolved" onclick="filterStatus(this)">Resolved</button>
    </div>
    <div class="thread-actions-bar">
      <button type="button" class="thread-tool-btn" id="consolidate-btn" onclick="runConsolidate()">✦ Consolidate Threads</button>
      <button type="button" class="thread-tool-btn thread-tool-ghost" id="archive-resolved-btn" onclick="archiveResolved()">Archive Resolved</button>
    </div>
  </div>

  <!-- Consolidation results panel -->
  <div id="consolidate-panel" hidden>
    <div class="consolidate-header">
      <span class="consolidate-title">Thread Consolidation Suggestions</span>
      <button type="button" class="btn-ghost" onclick="document.getElementById('consolidate-panel').hidden=true">✕</button>
    </div>
    <div id="consolidate-body"></div>
  </div>

  <!-- Sort + Tag filter bar -->
  <div class="browse-controls-bar">
    <div class="sort-control">
      <label class="sort-label" for="sort-select">Sort</label>
      <select id="sort-select" class="sort-select" onchange="applySort(this.value)">
        <option value="az">A → Z</option>
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
    </div>
  </div>

  <!-- Tag filter bar -->
  <div class="tag-filter-bar" id="tag-filter-bar">
    <div class="tag-filter-active" id="tag-filter-pills"></div>
    <div class="tag-add-wrap" id="tag-add-wrap">
      <button type="button" class="tag-add-btn" id="tag-add-btn" onclick="toggleTagPicker()">+ Filter</button>
      <div class="tag-picker" id="tag-picker" hidden>
        <input type="text" class="tag-picker-search" id="tag-picker-search" placeholder="Search tags…" oninput="filterTagPicker(this.value)" autocomplete="off">
        <div class="tag-picker-list" id="tag-picker-list"></div>
      </div>
    </div>
    <button type="button" class="tag-clear-btn" id="tag-filter-clear" onclick="clearTagFilter()" hidden>✕ Clear</button>
  </div>

  <div id="grid-area">
    {% include "_browse_grid.html" %}
  </div>

  <!-- Selection bar — shown when cards are checked -->
  <div class="selection-bar" id="selection-bar" hidden>
    <span class="selection-count" id="selection-count"></span>
    <span class="selection-names" id="selection-names"></span>
    <div class="selection-actions">
      <button type="button" onclick="openCompare()">Compare</button>
      <button type="button" onclick="openMerge()">⇢ Merge</button>
      <button type="button" class="btn-ghost" onclick="clearSelection()">Clear</button>
    </div>
  </div>

  <!-- Merge dialog -->
  <dialog class="compare-dialog" id="merge-dialog">
    <div class="compare-toolbar">
      <span class="compare-title">Merge Entities</span>
      <button type="button" class="btn-ghost" onclick="document.getElementById('merge-dialog').close()">✕ Close</button>
    </div>
    <div class="merge-body">
      <p class="muted merge-intro">Choose which entry to keep as canonical. The others will be merged into it and deleted.</p>
      <div id="merge-keep-options"></div>
      <div class="merge-name-row">
        <label class="upload-label" for="merge-canon-name">Canonical name (optional — leave blank to keep existing)</label>
        <input type="text" id="merge-canon-name" class="merge-name-input" placeholder="e.g. Trollskull Manor">
      </div>
      <div class="edit-actions merge-actions">
        <button type="button" class="btn-primary" onclick="confirmMerge()">✦ Merge</button>
        <button type="button" class="btn-ghost" onclick="document.getElementById('merge-dialog').close()">Cancel</button>
        <span class="edit-status" id="merge-status"></span>
      </div>
    </div>
  </dialog>

  <!-- Compare dialog -->
  <dialog class="compare-dialog" id="compare-dialog">
    <div class="compare-toolbar">
      <span class="compare-title">Comparing entities</span>
      <button type="button" class="btn-ghost" onclick="document.getElementById('compare-dialog').close()">✕ Close</button>
    </div>
    <div class="compare-columns" id="compare-columns"></div>
  </dialog>

  <script>
    let currentKind = '{{ kind }}';

    // ── Selection ─────────────────────────────────────────────────────────────
    let selected = new Map(); // path → name

    function updateSelection() {
      selected.clear();
      document.querySelectorAll('.card-checkbox:checked').forEach(cb => {
        selected.set(cb.value, cb.dataset.name);
      });
      const bar = document.getElementById('selection-bar');
      const countEl = document.getElementById('selection-count');
      const namesEl = document.getElementById('selection-names');
      if (selected.size === 0) {
        bar.hidden = true;
      } else {
        bar.hidden = false;
        countEl.textContent = `${selected.size} selected`;
        const names = [...selected.values()];
        namesEl.textContent = names.length <= 3
          ? names.join(' · ')
          : names.slice(0, 3).join(' · ') + ` +${names.length - 3} more`;
      }
    }

    function clearSelection() {
      document.querySelectorAll('.card-checkbox:checked').forEach(cb => { cb.checked = false; });
      updateSelection();
    }

    function applySort(mode) {
      const grid = document.getElementById('entity-grid');
      if (!grid) return;
      const cards = Array.from(grid.children);
      cards.sort((a, b) => {
        if (mode === 'az') {
          const na = (a.querySelector('.card-name,.thread-desc')?.textContent || '').trim().toLowerCase();
          const nb = (b.querySelector('.card-name,.thread-desc')?.textContent || '').trim().toLowerCase();
          return na.localeCompare(nb);
        }
        const da = a.dataset.firstSeen || '';
        const db = b.dataset.firstSeen || '';
        if (!da && !db) return 0;
        if (!da) return 1;
        if (!db) return -1;
        return mode === 'newest' ? db.localeCompare(da) : da.localeCompare(db);
      });
      cards.forEach(c => grid.appendChild(c));
    }

    // Re-apply sort after every HTMX grid swap
    document.addEventListener('htmx:afterSwap', () => {
      const sel = document.getElementById('sort-select');
      if (sel && sel.value !== 'az') applySort(sel.value);
    });

    function setActiveTab(btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentKind = btn.dataset.kind;
      selected.clear();
      document.getElementById('selection-bar').hidden = true;
      activeTags.clear();
      allegianceGrouped = false;
      const atb = document.getElementById('allegiance-toggle-bar');
      if (atb) atb.hidden = (currentKind !== 'npc');
      const ab = document.getElementById('allegiance-group-btn');
      if (ab) ab.classList.remove('active');
      const ttb = document.getElementById('thread-toolbar');
      if (ttb) ttb.hidden = (currentKind !== 'thread');
      // Reset thread filter state when switching tabs
      _activeAge = 'all';
      _activeStatus = 'all';
    }

    // ── Allegiance grouping ───────────────────────────────────────────────────
    let allegianceGrouped = false;

    function toggleAllegianceGroup() {
      const btn = document.getElementById('allegiance-group-btn');
      allegianceGrouped = !allegianceGrouped;
      btn.classList.toggle('active', allegianceGrouped);
      renderAllegianceGroups();
    }

    function renderAllegianceGroups() {
      const grid = document.getElementById('entity-grid');
      if (!grid) return;
      const cards = [...grid.querySelectorAll('.entity-card')];
      if (!allegianceGrouped) {
        // Remove group wrappers, put cards back flat
        grid.innerHTML = '';
        cards.forEach(c => { c.style.display = ''; grid.appendChild(c); });
        return;
      }
      const groups = new Map();
      cards.forEach(c => {
        const a = (c.dataset.allegiance || '').trim() || '— Unknown —';
        if (!groups.has(a)) groups.set(a, []);
        groups.get(a).push(c);
      });
      grid.innerHTML = '';
      [...groups.entries()].sort((a, b) => a[0].localeCompare(b[0])).forEach(([label, group]) => {
        const hdr = document.createElement('div');
        hdr.className = 'allegiance-group-header';
        hdr.textContent = label;
        grid.appendChild(hdr);
        group.forEach(c => grid.appendChild(c));
      });
    }

    // ── Disposition ───────────────────────────────────────────────────────────
    async function setDisposition(path, disposition, btn) {
      const resp = await fetch('/api/entity/disposition', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({path, disposition}),
      });
      if (!resp.ok) { alert('Failed to update disposition'); return; }
      const html = await fetch(`/browse/grid?kind=${currentKind}`).then(r => r.text());
      document.getElementById('grid-area').innerHTML = html;
      buildTagFilter();
      if (allegianceGrouped) renderAllegianceGroups();
    }

    // ── Merge ─────────────────────────────────────────────────────────────────
    function openMerge() {
      if (selected.size < 2) { alert('Select at least 2 entities to merge'); return; }
      const opts = document.getElementById('merge-keep-options');
      opts.innerHTML = '';
      [...selected.entries()].forEach(([path, name], i) => {
        const lbl = document.createElement('label');
        lbl.className = 'merge-keep-label';
        lbl.innerHTML = `<input type="radio" name="merge-keep" value="${path}" ${i === 0 ? 'checked' : ''}> ${name}`;
        opts.appendChild(lbl);
      });
      document.getElementById('merge-canon-name').value = '';
      document.getElementById('merge-status').textContent = '';
      document.getElementById('merge-dialog').showModal();
    }

    async function confirmMerge() {
      const keepEl = document.querySelector('input[name="merge-keep"]:checked');
      if (!keepEl) return;
      const keep   = keepEl.value;
      const others = [...selected.keys()].filter(p => p !== keep);
      const name   = document.getElementById('merge-canon-name').value.trim();
      const status = document.getElementById('merge-status');
      status.textContent = '…merging';

      const resp = await fetch('/api/entity/merge', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({keep, others, name}),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({detail: resp.statusText}));
        status.textContent = '✗ ' + (err.detail || resp.statusText);
        return;
      }
      const result = await resp.json();
      document.getElementById('merge-dialog').close();
      clearSelection();
      const html = await fetch(`/browse/grid?kind=${currentKind}`).then(r => r.text());
      document.getElementById('grid-area').innerHTML = html;
      buildTagFilter();
    }

    // ── Thread status ─────────────────────────────────────────────────────────
    async function setThreadStatus(path, status) {
      const resp = await fetch('/api/entity/status', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({path, status}),
      });
      if (!resp.ok) { alert('Failed to update status'); return; }
      const html = await fetch(`/browse/grid?kind=${currentKind}`).then(r => r.text());
      document.getElementById('grid-area').innerHTML = html;
      buildTagFilter();
    }

    // ── Tag filter ────────────────────────────────────────────────────────────
    let activeTags = new Set();
    let allAvailableTags = [];

    function buildTagFilter() {
      activeTags.clear();
      allAvailableTags = [];
      const seen = new Set();
      document.querySelectorAll('.entity-card[data-tags]').forEach(card => {
        card.dataset.tags.split(',').forEach(t => {
          const tag = t.trim();
          if (tag && !seen.has(tag)) { seen.add(tag); allAvailableTags.push(tag); }
        });
      });
      allAvailableTags.sort();
      document.getElementById('tag-filter-pills').innerHTML = '';
      document.getElementById('tag-filter-clear').hidden = true;
      document.getElementById('tag-picker').hidden = true;
      document.getElementById('tag-picker-list').innerHTML = '';
    }

    function toggleTagPicker() {
      const picker = document.getElementById('tag-picker');
      picker.hidden = !picker.hidden;
      if (!picker.hidden) {
        renderTagPickerList('');
        document.getElementById('tag-picker-search').value = '';
        document.getElementById('tag-picker-search').focus();
      }
    }

    function renderTagPickerList(query) {
      const list = document.getElementById('tag-picker-list');
      const filtered = query
        ? allAvailableTags.filter(t => t.toLowerCase().includes(query.toLowerCase()))
        : allAvailableTags;
      list.innerHTML = '';
      if (!filtered.length) {
        list.innerHTML = '<div class="tag-picker-empty">No tags found</div>';
        return;
      }
      filtered.forEach(tag => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tag-picker-item' + (activeTags.has(tag) ? ' active' : '');
        btn.textContent = tag;
        btn.onclick = () => { selectTag(tag); renderTagPickerList(document.getElementById('tag-picker-search').value); };
        list.appendChild(btn);
      });
    }

    function filterTagPicker(query) {
      renderTagPickerList(query);
    }

    function selectTag(tag) {
      if (activeTags.has(tag)) {
        activeTags.delete(tag);
      } else {
        activeTags.add(tag);
      }
      renderActivePills();
      applyTagFilter();
    }

    function removeTag(tag) {
      activeTags.delete(tag);
      renderActivePills();
      applyTagFilter();
      if (!document.getElementById('tag-picker').hidden) {
        renderTagPickerList(document.getElementById('tag-picker-search').value);
      }
    }

    function renderActivePills() {
      const pills = document.getElementById('tag-filter-pills');
      pills.innerHTML = '';
      activeTags.forEach(tag => {
        const pill = document.createElement('span');
        pill.className = 'tag-active-pill';
        pill.innerHTML = `${tag} <button type="button" onclick="removeTag('${tag.replace(/'/g,"\\'")}')">✕</button>`;
        pills.appendChild(pill);
      });
      document.getElementById('tag-filter-clear').hidden = activeTags.size === 0;
    }

    function clearTagFilter() {
      activeTags.clear();
      renderActivePills();
      applyTagFilter();
      document.getElementById('tag-picker').hidden = true;
    }

    function applyTagFilter() {
      document.querySelectorAll('.entity-card').forEach(card => {
        if (activeTags.size === 0) { card.style.display = ''; return; }
        const cardTags = new Set(card.dataset.tags.split(',').map(t => t.trim()).filter(Boolean));
        card.style.display = [...activeTags].some(t => cardTags.has(t)) ? '' : 'none';
      });
    }

    // ── Thread filters ────────────────────────────────────────────────────────
    let _activeAge = 'all';
    let _activeStatus = 'all';

    const TODAY_MS = new Date('2026-04-24').getTime();

    function _threadCardDate(card) {
      const d = card.dataset.firstSeen || '';
      return d ? new Date(d).getTime() : null;
    }

    function _applyThreadFilters() {
      document.querySelectorAll('.thread-card').forEach(card => {
        let show = true;

        // Age filter
        if (_activeAge !== 'all') {
          const ms = _threadCardDate(card);
          if (ms === null) {
            show = false;
          } else {
            const ageYrs = (TODAY_MS - ms) / (1000 * 60 * 60 * 24 * 365.25);
            if (_activeAge === 'recent' && ageYrs >= 1)   show = false;
            if (_activeAge === 'mid'    && (ageYrs < 1 || ageYrs >= 2)) show = false;
            if (_activeAge === 'old'    && ageYrs < 2)    show = false;
          }
        }

        // Status filter
        if (_activeStatus !== 'all' && show) {
          const badge = card.querySelector('.thread-status');
          const cardStatus = badge ? badge.textContent.trim().toLowerCase() : '';
          if (cardStatus !== _activeStatus) show = false;
        }

        card.style.display = show ? '' : 'none';
      });
    }

    function filterAge(btn) {
      document.querySelectorAll('.thread-age-filter .age-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _activeAge = btn.dataset.age;
      _applyThreadFilters();
    }

    function filterStatus(btn) {
      document.querySelectorAll('.thread-status-filter .age-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _activeStatus = btn.dataset.status;
      _applyThreadFilters();
    }

    // Re-apply thread filters after HTMX grid swap
    document.body.addEventListener('htmx:afterSwap', e => {
      if (e.detail.target.id === 'grid-area' && currentKind === 'thread') {
        _applyThreadFilters();
      }
    });

    // ── Archive resolved threads ──────────────────────────────────────────────
    async function archiveResolved() {
      const btn = document.getElementById('archive-resolved-btn');
      btn.textContent = '…archiving';
      btn.disabled = true;
      try {
        const resp = await fetch('/api/threads/archive-resolved', { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) { alert(data.detail || 'Archive failed'); return; }
        btn.textContent = `✓ Archived ${data.archived}`;
        // Reload grid
        const html = await fetch('/browse/grid?kind=thread').then(r => r.text());
        document.getElementById('grid-area').innerHTML = html;
        buildTagFilter();
      } catch (e) {
        alert('Archive failed: ' + e.message);
      } finally {
        btn.disabled = false;
        setTimeout(() => { btn.textContent = 'Archive Resolved'; }, 3000);
      }
    }

    // ── Consolidate threads (LLM grouping) ────────────────────────────────────
    async function runConsolidate() {
      const panel = document.getElementById('consolidate-panel');
      const body  = document.getElementById('consolidate-body');
      const btn   = document.getElementById('consolidate-btn');

      panel.hidden = false;
      body.innerHTML = '<p class="muted consolidate-loading">✦ Asking the LLM to group related threads…</p>';
      btn.disabled = true;

      try {
        const resp = await fetch('/api/threads/consolidate', { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) { body.innerHTML = `<p class="muted">Error: ${data.detail}</p>`; return; }

        if (!data.groups || data.groups.length === 0) {
          body.innerHTML = '<p class="muted">No consolidation suggestions — all threads look distinct.</p>';
          return;
        }

        body.innerHTML = '';
        data.groups.forEach(group => {
          const div = document.createElement('div');
          div.className = 'consolidate-group';
          div.innerHTML = `
            <div class="consolidate-group-label">
              <span class="consolidate-group-title">${escHtml(group.theme)}</span>
              <span class="consolidate-group-count">${group.threads.length} threads</span>
            </div>
            <ul class="consolidate-thread-list">
              ${group.threads.map(t => `<li>${escHtml(t)}</li>`).join('')}
            </ul>
            ${group.suggestion ? `<p class="consolidate-suggestion">${escHtml(group.suggestion)}</p>` : ''}
          `;
          body.appendChild(div);
        });
      } catch (e) {
        body.innerHTML = `<p class="muted">Error: ${e.message}</p>`;
      } finally {
        btn.disabled = false;
      }
    }

    function escHtml(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Close picker when clicking outside
    document.addEventListener('click', e => {
      const wrap = document.getElementById('tag-add-wrap');
      if (wrap && !wrap.contains(e.target)) {
        const picker = document.getElementById('tag-picker');
        if (picker) picker.hidden = true;
      }
    });

    // ── Compare ───────────────────────────────────────────────────────────────
    async function openCompare() {
      if (selected.size === 0) return;
      const cols = document.getElementById('compare-columns');
      cols.innerHTML = '<p class="muted" style="padding:1rem">Loading…</p>';
      document.getElementById('compare-dialog').showModal();

      const fetches = [...selected.keys()].map(path =>
        fetch(`/entity/partial?path=${encodeURIComponent(path)}`).then(r => r.text())
      );
      const fragments = await Promise.all(fetches);
      cols.innerHTML = '';
      fragments.forEach(html => {
        const col = document.createElement('div');
        col.className = 'compare-col';
        col.innerHTML = html;
        cols.appendChild(col);
      });
    }

    document.getElementById('compare-dialog').addEventListener('click', function(e) {
      if (e.target === this) this.close();
    });

    // ── Card expand/collapse ──────────────────────────────────────────────────
    function initCardExpand() {
      document.querySelectorAll('.entity-card-inner').forEach(inner => {
        if (inner.scrollHeight > inner.clientHeight + 4) {
          inner.classList.add('overflows');
          const btn = inner.closest('.entity-card').querySelector('.card-expand-btn');
          if (btn) btn.classList.add('visible');
        }
      });
    }

    function toggleCardExpand(btn) {
      const inner = btn.closest('.entity-card').querySelector('.entity-card-inner');
      const expanded = inner.classList.toggle('expanded');
      btn.textContent = expanded ? '▲ show less' : '▼ show more';
    }

    // Rebuild tag filter after initial load and after every HTMX grid swap
    buildTagFilter();
    initCardExpand();
    document.body.addEventListener('htmx:afterSwap', e => {
      if (e.detail.target.id === 'grid-area') { buildTagFilter(); initCardExpand(); }
    });
  </script>
</body>
</html>
